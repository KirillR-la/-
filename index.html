<style>
    /* Добавь это в секцию стилей, чтобы картинка менялась плавно */
    #current-photo {
        width: 100%;
        height: 450px;
        object-fit: cover;
        border: 1px solid #ddd;
        transition: opacity 0.3s ease-in-out; /* Плавное исчезновение */
    }
</style>

<script>
    let currentIdx = 1;
    const totalPhotos = 11;

    function changeSlide(step) {
        const img = document.getElementById('current-photo');
        const counter = document.getElementById('photo-counter');
        
        // 1. Сначала меняем индекс
        currentIdx += step;
        if (currentIdx > totalPhotos) currentIdx = 1;
        if (currentIdx < 1) currentIdx = totalPhotos;
        
        // 2. Делаем картинку прозрачной перед заменой
        img.style.opacity = '0';
        
        // 3. Ждем мгновение и меняем источник
        setTimeout(() => {
            // Добавляем случайный параметр в конце ссылки, чтобы браузер не брал из кэша старое фото
            img.src = `${currentIdx}.jpg?t=${new Date().getTime()}`;
            
            // Как только фото загрузится — проявляем его
            img.onload = () => {
                img.style.opacity = '1';
                counter.textContent = `${currentIdx} / ${totalPhotos}`;
            };
        }, 300);
        
        // Эффект конфетти при нажатии
        confetti({ 
            particleCount: 15, 
            spread: 40, 
            origin: { y: 0.8 },
            colors: ['#ff0066', '#ffffff'] 
        });
    }
</script>
