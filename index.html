<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Марта!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; overflow-x: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        .container { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 20px; }
        #countdown { font-size: 25vw; color: #0f0; display: none; font-weight: bold; }
        #gif-stage { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; justify-content: center; align-items: center; z-index: 100; }
        #gif-stage img { max-width: 100%; max-height: 100%; }
        #final-wish { display: none; z-index: 30; flex-direction: column; align-items: center; width: 100%; }
        
        #word-wish { font-size: 10vw; font-weight: bold; color: #fff; text-shadow: 0 0 15px #ff0066; margin-bottom: 10px; height: 1.2em; transition: opacity 0.5s; }
        .photo-frame { width: 300px; height: 400px; background: white; padding: 10px 10px 40px 10px; border-radius: 5px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 30px; }
        #current-photo { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s; }

        /* Кнопка звука */
        #audio-btn {
            background: #fff;
            color: #ff3399;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s, opacity 1s;
            opacity: 0; /* Сначала скрыта */
        }
        #audio-btn:hover { transform: scale(1.05); background: #f0f0f0; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <audio id="congratulation-audio" src="track.mp3"></audio>

    <div class="container">
        <div id="countdown">3</div>
        <div id="final-wish">
            <div id="word-wish">Сияй!</div>
            <div class="photo-frame">
                <img id="current-photo" src="1.jpg">
            </div>
            <button id="audio-btn" onclick="playAudio()">
                <span>▶ Послушать поздравление</span>
            </button>
        </div>
    </div>
    <div id="gif-stage"><img src="gift.gif"></div>

    <script>
        const wishes = ["Сияй!", "Люби!", "Мечтай!", "Цвети!", "Радуй!", "Улыбайся!", "Будь!", "Сверкай!", "Очаровывай!", "Побеждай!", "Восхищай!"];
        const totalPhotos = 11;
        let idx = 1;

        function playAudio() {
            const audio = document.getElementById('congratulation-audio');
            audio.play();
            document.getElementById('audio-btn').innerHTML = "<span>🎵 Звучит для тебя...</span>";
        }

        function startSlideshow() {
            // Показываем кнопку звука через 2 секунды после начала шоу
            setTimeout(() => { document.getElementById('audio-btn').style.opacity = '1'; }, 2000);

            setInterval(() => {
                const img = document.getElementById('current-photo');
                const word = document.getElementById('word-wish');
                img.style.opacity = '0';
                word.style.opacity = '0';
                setTimeout(() => {
                    idx = (idx % totalPhotos) + 1;
                    img.src = idx + ".jpg";
                    word.textContent = wishes[idx - 1];
                    img.style.opacity = '1';
                    word.style.opacity = '1';
                    confetti({ particleCount: 10, spread: 30, origin: { y: 0.8 }, colors: ['#ff3399'] });
                }, 500);
            }, 2500);
        }

        // --- МАТРИЦА ---
        const c = document.getElementById('matrix'), ctx = c.getContext('2d');
        c.height = window.innerHeight; c.width = window.innerWidth;
        const chars = "ЮЛЬКАЧУМАК8".split("");
        const drops = Array(Math.floor(c.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = '#0F0'; ctx.font = '16px monospace';
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*16, y*16);
                if(y*16 > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        let mInt = setInterval(draw, 35);

        // --- ТАЙМИНГИ ---
        setTimeout(() => {
            clearInterval(mInt); c.style.display = 'none';
            document.getElementById('countdown').style.display = 'block';
            let t = 3;
            let ti = setInterval(() => {
                t--; 
                if(t > 0) document.getElementById('countdown').textContent = t;
                else {
                    clearInterval(ti);
                    document.getElementById('countdown').style.display = 'none';
                    document.getElementById('gif-stage').style.display = 'flex';
                    setTimeout(() => {
                        document.getElementById('gif-stage').style.display = 'none';
                        document.body.style.background = "radial-gradient(circle, #ff99cc, #ff3399)";
                        document.getElementById('final-wish').style.display = 'flex';
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        startSlideshow();
                    }, 3000);
                }
            }, 1000);
        }, 5000);
    </script>
</body>
</html>
