<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Марта!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        .container { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        #countdown { font-size: 25vw; color: #0f0; display: none; font-weight: bold; }
        #gif-stage { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; justify-content: center; align-items: center; z-index: 100; }
        #gif-stage img { max-width: 100%; max-height: 100%; }
        #final-wish { display: none; z-index: 30; flex-direction: column; align-items: center; width: 100%; }
        
        /* Стили для поздравления над фото */
        #word-wish {
            font-size: 10vw;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px #ff0066;
            margin-bottom: 20px;
            height: 1.2em; /* Чтобы текст не прыгал */
            transition: opacity 0.5s ease;
        }

        .photo-frame { width: 320px; height: 420px; background: white; padding: 10px 10px 40px 10px; border-radius: 5px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #current-photo { width: 100%; height: 100%; object-fit: cover; opacity: 1; transition: opacity 0.5s ease; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="container">
        <div id="countdown">3</div>
        <div id="final-wish">
            <div id="word-wish">Любимой</div> <div class="photo-frame">
                <img id="current-photo" src="1.jpg">
            </div>
        </div>
    </div>
    <div id="gif-stage"><img src="gift.gif"></div>

    <script>
        // 1. Список слов (по одному на каждое фото)
        const wishes = [
            "Сияй!", "Люби!", "Мечтай!", "Цвети!", "Радуй!", 
            "Улыбайся!", "Будь!", "Сверкай!", "Очаровывай!", "Побеждай!", "Восхищай!"
        ];

        // 2. ПРЕДЗАГРУЗКА
        const totalPhotos = 11;
        for (let i = 1; i <= totalPhotos; i++) {
            const img = new Image();
            img.src = i + ".jpg";
        }

        // 3. МАТРИЦА
        const c = document.getElementById('matrix'), ctx = c.getContext('2d');
        c.height = window.innerHeight; c.width = window.innerWidth;
        const chars = "ЮЛЬКАЧУМАК8".split("");
        const drops = Array(Math.floor(c.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = '#0F0'; ctx.font = '16px monospace';
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*16, y*16);
                if(y*16 > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        let mInt = setInterval(draw, 35);

        // 4. СЛАЙДЕР С ТЕКСТОМ
        let idx = 1;
        function startSlideshow() {
            setInterval(() => {
                const img = document.getElementById('current-photo');
                const word = document.getElementById('word-wish');
                
                img.style.opacity = '0';
                word.style.opacity = '0';
                
                setTimeout(() => {
                    idx = (idx % totalPhotos) + 1;
                    img.src = idx + ".jpg";
                    word.textContent = wishes[idx - 1]; // Берем слово из списка
                    
                    img.style.opacity = '1';
                    word.style.opacity = '1';
                    
                    confetti({ particleCount: 15, spread: 40, origin: { y: 0.8 }, colors: ['#ff3399'] });
                }, 500);
            }, 2500);
        }

        // 5. ТАЙМИНГИ
        setTimeout(() => {
            clearInterval(mInt); c.style.display = 'none';
            document.getElementById('countdown').style.display = 'block';
            let t = 3;
            let ti = setInterval(() => {
                t--; 
                if(t > 0) document.getElementById('countdown').textContent = t;
                else {
                    clearInterval(ti);
                    document.getElementById('countdown').style.display = 'none';
                    document.getElementById('gif-stage').style.display = 'flex';
                    setTimeout(() => {
                        document.getElementById('gif-stage').style.display = 'none';
                        document.body.style.background = "radial-gradient(circle, #ff99cc, #ff3399)";
                        document.getElementById('final-wish').style.display = 'flex';
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        startSlideshow();
                    }, 3000);
                }
            }, 1000);
        }, 5000);
    </script>
</body>
</html>
