<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта, Юлька Чумак!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; overflow-x: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        #countdown { font-size: 25vw; color: #0f0; display: none; font-weight: bold; }

        #gif-stage {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: black;
            justify-content: center; align-items: center;
            z-index: 100;
        }
        #gif-stage img { max-width: 100%; max-height: 100%; object-fit: contain; }

        #final-wish { display: none; z-index: 30; width: 100%; }
        #final-wish h1 {
            font-size: 8vw;
            color: white;
            text-shadow: 0 0 20px #ff0066, 2px 2px 10px rgba(0,0,0,0.5);
            margin-bottom: 50px;
        }

        #photo-album {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1300px;
            opacity: 0;
            transition: opacity 2s ease;
            margin-top: 20px;
        }

        .photo-card {
            background: white;
            padding: 10px 10px 35px 10px;
            border-radius: 3px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.4s ease;
        }
        .photo-card:hover { transform: scale(1.1) rotate(0deg) !important; z-index: 50; }
        
        .photo-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <div id="countdown">3</div>
        
        <div id="final-wish">
            <h1>Юлька, с 8 Марта! 🌸</h1>
            <div id="photo-album">
                <script>
                    for(let i=1; i<=11; i++) {
                        let rotate = (Math.random() * 12 - 6).toFixed(1);
                        document.write(`
                            <div class="photo-card" style="transform: rotate(${rotate}deg)">
                                <img src="${i}.jpg" alt="Фото ${i}" onerror="this.src='https://via.placeholder.com/200x250?text=Фото+${i}.jpg'">
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>
    </div>

    <div id="gif-stage">
        <img src="gift.gif" alt="Surprise" onerror="this.src='https://media.giphy.com/media/26vUxArWpIDB2F8Y0/giphy.gif'">
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const characters = "ЮЛЬКАЧУМАК8МАРТА";
        const fontSize = 18;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        let matrixInterval = setInterval(drawMatrix, 40);

        setTimeout(() => {
            clearInterval(matrixInterval);
            canvas.style.display = 'none';
            const countEl = document.getElementById('countdown');
            countEl.style.display = 'block';
            
            let count = 3;
            const timer = setInterval(() => {
                count--;
                if (count > 0) countEl.textContent = count;
                else {
                    clearInterval(timer);
                    countEl.style.display = 'none';
                    document.getElementById('gif-stage').style.display = 'flex';
                    
                    setTimeout(() => {
                        document.getElementById('gif-stage').style.display = 'none';
                        showFinal();
                    }, 3000);
                }
            }, 1000);
        }, 5000);

        function showFinal() {
            document.body.style.background = "radial-gradient(circle, #ff99cc 0%, #ff3399 100%)";
            document.getElementById('final-wish').style.display = 'block';
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            setTimeout(() => {
                document.getElementById('photo-album').style.opacity = '1';
                setInterval(() => {
                    confetti({ particleCount: 40, angle: 60, spread: 55, origin: { x: 0 } });
                    confetti({ particleCount: 40, angle: 120, spread: 55, origin: { x: 1 } });
                }, 3000);
            }, 1500);
        }
    </script>
</body>
</html>
